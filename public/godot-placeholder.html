<!DOCTYPE html>
<html>
<head>
    <style>
        body { margin: 0; background: #0a0a0a; color: #333; display: flex; align-items: center; justify-center; height: 100vh; overflow: hidden; font-family: sans-serif; flex-direction: column; }
        .cube { width: 100px; height: 100px; position: relative; transform-style: preserve-3d; animation: rotate 5s infinite linear; }
        .face { position: absolute; width: 100px; height: 100px; border: 1px solid #ff4d4d; background: rgba(255, 77, 77, 0.1); }
        .front  { transform: translateZ(50px); }
        .back   { transform: rotateY(180deg) translateZ(50px); }
        .right  { transform: rotateY(90deg) translateZ(50px); }
        .left   { transform: rotateY(-90deg) translateZ(50px); }
        .top    { transform: rotateX(90deg) translateZ(50px); }
        .bottom { transform: rotateX(-90deg) translateZ(50px); }
        @keyframes rotate { from { transform: rotateX(0) rotateY(0); } to { transform: rotateX(360deg) rotateY(360deg); } }
        .label { margin-top: 20px; color: #555; font-size: 12px; letter-spacing: 2px; }
    </style>
</head>
<body>
    <div class="cube">
        <div class="face front"></div>
        <div class="face back"></div>
        <div class="face right"></div>
        <div class="face left"></div>
        <div class="face top"></div>
        <div class="face bottom"></div>
    </div>
    <div class="label">GODOT ENGINE WASM LOADER</div>
</body>
</html>
